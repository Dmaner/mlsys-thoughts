<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Muted font comparison</title>
  <desc id="desc">Four gray typography options for the personal website.</desc>
  <defs>
    <pattern id="paperDots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#162530" opacity=".055"/>
    </pattern>
    <filter id="softShadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#171d22" flood-opacity=".13"/>
    </filter>
  </defs>
  <rect width="1180" height="760" fill="#f5f3ec"/>
  <rect width="1180" height="760" fill="url(#paperDots)"/>

  <g transform="translate(72 58)">
    <text x="0" y="0" fill="#162530" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="700">Gray Font Options</text>
    <text x="2" y="38" fill="#6b7880" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif" font-size="18" font-weight="600">同一套页面语气下，比较灰色辅助文字的协调感。</text>
  </g>

  <g transform="translate(72 150)">
    <g filter="url(#softShadow)">
      <rect width="492" height="238" rx="9" fill="#fbfaf6" stroke="#d9d8d2"/>
      <circle cx="24" cy="24" r="4" fill="#526cff"/>
      <circle cx="38" cy="24" r="4" fill="#b9c3ca"/>
      <circle cx="52" cy="24" r="4" fill="#b9c3ca"/>
      <text x="34" y="82" fill="#6b7880" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif" font-size="13" font-weight="820">SYSTEM / SF PRO TEXT</text>
      <text x="34" y="128" fill="#162530" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700">ML System Thoughts</text>
      <text x="34" y="170" fill="#6b7880" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif" font-size="19" font-weight="590">About Agent, Inference and CUDA kernel</text>
      <text x="34" y="202" fill="#6b7880" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif" font-size="15" font-weight="520">最贴近 macOS / GitHub，干净、稳、不抢标题。</text>
    </g>

    <g transform="translate(542 0)" filter="url(#softShadow)">
      <rect width="492" height="238" rx="9" fill="#fbfaf6" stroke="#d9d8d2"/>
      <circle cx="24" cy="24" r="4" fill="#526cff"/>
      <circle cx="38" cy="24" r="4" fill="#b9c3ca"/>
      <circle cx="52" cy="24" r="4" fill="#b9c3ca"/>
      <text x="34" y="82" fill="#66737b" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="820">INTER</text>
      <text x="34" y="128" fill="#162530" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700">ML System Thoughts</text>
      <text x="34" y="170" fill="#66737b" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="19" font-weight="590">About Agent, Inference and CUDA kernel</text>
      <text x="34" y="202" fill="#66737b" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="520">技术博客感更强，字形现代，阅读也比较舒服。</text>
    </g>

    <g transform="translate(0 286)" filter="url(#softShadow)">
      <rect width="492" height="238" rx="9" fill="#fbfaf6" stroke="#d9d8d2"/>
      <circle cx="24" cy="24" r="4" fill="#526cff"/>
      <circle cx="38" cy="24" r="4" fill="#b9c3ca"/>
      <circle cx="52" cy="24" r="4" fill="#b9c3ca"/>
      <text x="34" y="82" fill="#6a7780" font-family="'IBM Plex Sans', Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="820">IBM PLEX SANS</text>
      <text x="34" y="128" fill="#162530" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700">ML System Thoughts</text>
      <text x="34" y="170" fill="#6a7780" font-family="'IBM Plex Sans', Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="19" font-weight="590">About Agent, Inference and CUDA kernel</text>
      <text x="34" y="202" fill="#6a7780" font-family="'IBM Plex Sans', Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="520">更像研究笔记/工程文档，略硬朗一点。</text>
    </g>

    <g transform="translate(542 286)" filter="url(#softShadow)">
      <rect width="492" height="238" rx="9" fill="#fbfaf6" stroke="#d9d8d2"/>
      <circle cx="24" cy="24" r="4" fill="#526cff"/>
      <circle cx="38" cy="24" r="4" fill="#b9c3ca"/>
      <circle cx="52" cy="24" r="4" fill="#b9c3ca"/>
      <text x="34" y="82" fill="#6c7880" font-family="'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="820">SOURCE SANS 3</text>
      <text x="34" y="128" fill="#162530" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700">ML System Thoughts</text>
      <text x="34" y="170" fill="#6c7880" font-family="'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="19" font-weight="590">About Agent, Inference and CUDA kernel</text>
      <text x="34" y="202" fill="#6c7880" font-family="'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="520">更柔和，博客味更重，但技术感稍弱。</text>
    </g>
  </g>
</svg>
